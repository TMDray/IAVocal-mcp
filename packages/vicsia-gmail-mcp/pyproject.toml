[project]
name = "vicsia-gmail-mcp"
version = "0.1.2"
description = "Gmail MCP server for Vicsia — 6 tools for search, read, draft, calendar"
license = "MIT"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "mcp>=1.0",
    "cryptography>=41.0.0",
]

[project.scripts]
vicsia-gmail-mcp = "vicsia_gmail_mcp.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vicsia_gmail_mcp"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 120
